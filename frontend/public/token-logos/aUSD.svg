<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Yellow background -->
  <rect width="100" height="100" fill="#FFE082"/>

  <defs>
    <!-- Mask: horizontal gap cuts outer ring on the LEFT side only;
         the right side is also cut but the stem covers that area -->
    <mask id="ring-gap">
      <rect width="100" height="100" fill="white"/>
      <rect x="0" y="45" width="100" height="10" fill="black"/>
    </mask>
  </defs>

  <!-- Outer ring — full circle, split horizontally by the mask -->
  <circle cx="50" cy="50" r="35.5" fill="none" stroke="#000" stroke-width="9" mask="url(#ring-gap)"/>

  <!-- Inner "a" bowl — 300° arc, C-shape opening to the left (gap ≈ 60° centred at 9 o'clock) -->
  <!-- Start at 300° (10 o'clock): (35.6, 41.5)   End at 240° (8 o'clock): (35.6, 58.5)
       Arc goes clockwise through 12→3→6 o'clock -->
  <path d="M 35.6 41.5 A 16.5 16.5 0 1 1 35.6 58.5" fill="none" stroke="#000" stroke-width="9"/>

  <!-- Vertical stem of the "a" — flush with the right side of the bowl stroke -->
  <rect x="62" y="33" width="9" height="36" fill="#000"/>
</svg>
